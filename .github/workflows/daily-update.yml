name: 每日 GitHub 热点更新

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行热点更新脚本
        run: |
          python scripts/update_trending.py

      - name: 提交并推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHubBook Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 每日热点更新 $(date +'%Y-%m-%d')"
          git push
